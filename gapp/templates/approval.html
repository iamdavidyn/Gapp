<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Waiting for Approval</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, rgba(26, 114, 250, 0.18), transparent 60%), #f4f9ff;
      font-family: system-ui, sans-serif;
      color: #0f315c;
    }

    .card {
      width: min(520px, 92%);
      padding: 2.5rem;
      border-radius: 24px;
      background: #fff;
      box-shadow: 0 24px 60px rgba(15, 49, 92, 0.12);
      text-align: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.75rem 1rem;
      border-radius: 999px;
      background: rgba(26, 114, 250, 0.12);
      color: #1a72fa;
      font-weight: 700;
      margin-bottom: 1.5rem;
    }

    h1 {
      margin: 0 0 1rem;
      font-size: clamp(2rem, 4vw, 2.6rem);
      line-height: 1.05;
    }

    p {
      margin: 0 0 1.5rem;
      color: #4d5f7b;
      line-height: 1.8;
      font-size: 1rem;
    }

    .note {
      margin-top: 1.5rem;
      border: 1px solid rgba(26, 114, 250, 0.14);
      border-radius: 18px;
      padding: 1rem 1.25rem;
      background: rgba(26, 114, 250, 0.05);
      color: #1a72fa;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 1.75rem;
      padding: 0.95rem 1.4rem;
      border-radius: 16px;
      border: none;
      background: linear-gradient(135deg, #1a72fa, #0b4ed2);
      color: #fff;
      font-weight: 700;
      text-decoration: none;
      transition: transform 0.2s ease;
    }

    .button:hover {
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <article class="card">
    <div class="badge">Admin Approval Pending</div>
    <h1>Please wait for admin approval</h1>
    <p>Your account request has been received successfully. An administrator will review your registration and enable access once approved.</p>
    <div class="note">You can return to the login page to check back later.</div>
    <a href="/login/" class="button">Back to Login</a>
  </article>
</body>
</html>
