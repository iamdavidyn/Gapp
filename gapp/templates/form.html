<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GCash Send</title>

    <style>
      :root {
        --bg: #f3f8ff;
        --card: #ffffff;
        --primary: #1a72fa;
        --primary-2: #0b4ed2;
        --text: #0d2454;
        --muted: #4d5f7b;
        --border: rgba(26, 114, 250, 0.25);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, rgba(26, 114, 250, 0.18), transparent 60%),
          var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .container {
        width: min(460px, 92%);
        padding: 2.2rem 2rem;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 20px;
        box-shadow: 0 18px 40px rgba(8, 32, 84, 0.12);
      }

      .header {
        text-align: center;
        margin-bottom: 1.6rem;
      }

      .header h1 {
        margin: 0;
        font-size: 1.55rem;
        letter-spacing: 0.02em;
        color: var(--primary);
      }

      .header p {
        margin: 0.5rem 0 0;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .field {
        margin-bottom: 1.25rem;
      }

      label {
        display: block;
        margin-bottom: 0.35rem;
        font-weight: 700;
        color: var(--text);
        font-size: 0.95rem;
      }

      input[type="text"],
      input[type="tel"],
      input[type="number"] {
        width: 100%;
        padding: 0.85rem 1rem;
        border-radius: 14px;
        border: 1px solid rgba(26, 114, 250, 0.35);
        background: rgba(250, 253, 255, 0.9);
        font-size: 0.95rem;
        color: var(--text);
        outline: none;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }

      input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 4px rgba(26, 114, 250, 0.18);
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.8rem;
      }

      .row .field {
        margin-bottom: 0;
      }

      .hint {
        margin-top: 0.8rem;
        font-size: 0.875rem;
        color: var(--muted);
      }

      .btn {
        width: 100%;
        padding: 0.9rem 1rem;
        border-radius: 16px;
        border: none;
        margin-top: 30px;
        background: linear-gradient(135deg, var(--primary), var(--primary-2));
        color: white;
        font-weight: 700;
        letter-spacing: 0.02em;
        cursor: pointer;
        transition: filter 0.2s ease;
      }

      .btn:hover {
        filter: brightness(1.05);
      }

      .btn:active {
        transform: translateY(1px);
      }

      .note {
        margin-top: 1.4rem;
        font-size: 0.85rem;
        color: var(--muted);
        text-align: center;
      }

      @media (max-width: 420px) {
        .row {
          grid-template-columns: 1fr;
        }

        .container {
          padding: 1.8rem 1.2rem;
        }
      }
    </style>
  </head>

  <body>
    <section class="container">
      <header class="header">
        <h1>GCash Send</h1>
        <p>Enter your details to check your balance and send money.</p>
      </header>

      <form method="POST">
        {% csrf_token %}
        <div class="field">
          <label for="gcash-name">GCash Name</label>
          <input id="gcash-name" name="gcname" type="text" placeholder="Juan Dela Cruz" required />
        </div>

        <div class="field">
          <label for="gcash-number">GCash Number</label>
          <input
            name="gnumber"
            type="tel"
            placeholder="+63 912 345 6789"
            value="+63"
            pattern="+63"
            required
          />
        </div>
        {% load humanize %}
        <div class="row">
          <div class="field">
            <label for="balance">Balance</label>
            <input
              id="balance"
              name="balance"
              type="number"
              step="0.01"
              min="0"
              placeholder="balance"
              required
            />
          </div>

          <div class="field">
            <label for="amount">Amount</label>
            <input
              id="amount"
              name="amount"
              type="number"
              step="0.01"
              min="0"
              placeholder="amount"
              required
            />
          </div>
        </div>

        <button type="submit" class="btn">Continue</button>
      </form>
    </section>
  </body>
</html>
